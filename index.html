<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Video Player Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            aspect-ratio: 16/9;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #475569;
        }

        button.active-server {
            background-color: var(--primary);
            border-color: #60a5fa;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="video-player" controls preload="auto"></video>
        
        <div class="controls" id="server-controls">
            </div>

        <div class="status" id="status-text">Inizializzazione player...</div>
    </div>

    <script>
        window.video = { id: '237396', filename: '' };
        window.streams = [
            {"name":"Server1","active":true,"url":"https:\/\/vixcloud.co\/playlist\/237396?ub=1"},
            {"name":"Server2","active":false,"url":"https:\/\/vixcloud.co\/playlist\/237396?ab=1"}
        ];
        window.masterPlaylist = {
            params: {
                'token': '83059bd4e7ce8d27a06d255ea2aceb26',
                'expires': '1782324217',
                'asn': '',
            },
            url: 'https://vixcloud.co/playlist/237396',
        }
        window.canPlayFHD = true;
        window.thumbnailsUrl = 'https://sc-u6-01.vix-content.net/hls/15/6/09/609f2357-f786-4145-a94c-9671be47e3af/thumbnails/thumbnails.vtt';
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const videoElement = document.getElementById('video-player');
            const controlsContainer = document.getElementById('server-controls');
            const statusText = document.getElementById('status-text');
            let hlsInstance = null; // Manteniamo un riferimento all'istanza HLS per poterla distruggere quando cambiamo server

            // Funzione principale per caricare e riprodurre lo stream
            function loadStream(streamUrl, serverName) {
                // 1. Costruiamo l'URL unendo la base del server con i parametri di sicurezza
                const token = window.masterPlaylist.params.token;
                const expires = window.masterPlaylist.params.expires;
                const finalUrl = `${streamUrl}&token=${token}&expires=${expires}`;

                statusText.innerText = `Connessione a ${serverName}...`;

                // 2. Logica di riproduzione
                if (Hls.isSupported()) {
                    // Se esiste già un'istanza (es. stiamo cambiando server), distruggila prima di crearne una nuova
                    if (hlsInstance) {
                        hlsInstance.destroy();
                    }

                    // Crea un nuovo traduttore HLS
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(finalUrl);
                    hlsInstance.attachMedia(videoElement);

                    // Quando il manifesto è caricato, fai partire il video
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        statusText.innerText = `In riproduzione da ${serverName} (Risoluzione massima: ${window.canPlayFHD ? 'FHD' : 'SD'})`;
                        videoElement.play().catch(err => {
                            console.warn("Autoplay bloccato dal browser. Premi play manualmente.", err);
                        });
                    });

                    // Gestione base degli errori di rete o caricamento
                    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            statusText.innerText = `Errore fatale su ${serverName}. Prova l'altro server.`;
                            statusText.style.color = "#ef4444"; // Rosso per errore
                        }
                    });

                } 
                // 3. Fallback per Safari (che supporta HLS nativamente senza librerie)
                else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = finalUrl;
                    videoElement.addEventListener('loadedmetadata', () => {
                        statusText.innerText = `In riproduzione da ${serverName} (Nativo Safari)`;
                        videoElement.play();
                    });
                } 
                // 4. Se il browser non supporta nulla di tutto ciò
                else {
                    statusText.innerText = "Il tuo browser non supporta la riproduzione di video HLS.";
                }
            }

            // Genera l'interfaccia dei bottoni per cambiare server
            function setupUI() {
                window.streams.forEach(stream => {
                    const btn = document.createElement('button');
                    btn.innerText = stream.name;
                    
                    if (stream.active) {
                        btn.classList.add('active-server');
                        // Avvia subito il server attivo di default
                        loadStream(stream.url, stream.name);
                    }

                    btn.addEventListener('click', () => {
                        // Rimuovi classe active da tutti i bottoni e mettila su quello cliccato
                        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active-server'));
                        btn.classList.add('active-server');
                        
                        // Avvia il nuovo stream
                        loadStream(stream.url, stream.name);
                    });

                    controlsContainer.appendChild(btn);
                });
            }

            // Inizializza tutto
            setupUI();
        });
    </script>
</body>
</html>
