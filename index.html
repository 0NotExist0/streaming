<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Automatico Avanzato</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #8b5cf6;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1em;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background 0.2s;
        }

        button:hover { background-color: #7c3aed; }

        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            aspect-ratio: 16/9;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #94a3b8;
            text-align: center;
            font-family: monospace;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        .error-text { color: #ef4444; }
        .success-text { color: #10b981; }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cerca un film (es. John Wick 4)">
            <button onclick="processStream()">Cerca e Riproduci</button>
        </div>
        
        <video id="video-player" controls preload="auto"></video>
        <div class="status" id="status-text">In attesa di un comando...</div>
    </div>

    <script>
        const videoElement = document.getElementById('video-player');
        const statusText = document.getElementById('status-text');
        let hlsInstance = null;

        class CORSProxyLoader extends Hls.DefaultConfig.loader {
            constructor(config) {
                super(config);
                const originalLoad = this.load.bind(this);
                this.load = function (context, config, callbacks) {
                    if (context.url.startsWith('http')) {
                        context.url = 'https://corsproxy.io/?' + encodeURIComponent(context.url);
                    }
                    originalLoad(context, config, callbacks);
                };
            }
        }

        async function processStream() {
            const movieQuery = document.getElementById('searchInput').value;
            if (!movieQuery) return;

            // FASE 1: Ricerca testuale
            statusText.innerText = `Ricerca di "${movieQuery}" in corso...`;
            statusText.className = 'status';
            
            try {
                const searchRes = await fetch(`/api/search?q=${encodeURIComponent(movieQuery)}`);
                const searchData = await searchRes.json();

                if (searchData.error || !searchData.length) {
                    statusText.innerHTML = `<span class="error-text">Film non trovato o errore server.</span>`;
                    return;
                }

                const movie = searchData[0]; // Prendiamo il primo risultato
                statusText.innerText = `Trovato: ${movie.name}. Estrazione del video in corso...`;

                // FASE 2: Richiesta estrazione flussi a Python
                const streamRes = await fetch(`/api/get_stream?sc_id=${movie.id}`);
                const streamData = await streamRes.json();

                if (streamData.error) {
                    statusText.innerHTML = `<span class="error-text">Errore Estrazione: ${streamData.error}</span>`;
                    return;
                }

                if (streamData.m3u8_url) {
                    playVideo(streamData.m3u8_url);
                }

            } catch (error) {
                statusText.innerHTML = `<span class="error-text">Errore di comunicazione con le API di Vercel.</span>`;
            }
        }

        function playVideo(m3u8Url) {
            statusText.innerText = `Inizializzazione proxy per bypass CORS...`;

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    pLoader: CORSProxyLoader,
                    fLoader: CORSProxyLoader
                });
                
                hlsInstance.loadSource(m3u8Url);
                hlsInstance.attachMedia(videoElement);

                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    statusText.innerHTML = `<span class="success-text">Riproduzione avviata con successo!</span>`;
                    videoElement.play().catch(() => console.warn("L'utente deve premere play manualmente"));
                });

                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusText.innerHTML = `<span class="error-text">Errore fatale del video. Proxy intasato o blocco attivo.</span>`;
                        hlsInstance.destroy();
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = m3u8Url;
                videoElement.play();
            }
        }
    </script>
</body>
</html>
