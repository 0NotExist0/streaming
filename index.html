<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Player su Vercel</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #8b5cf6;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #7c3aed; }

        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            aspect-ratio: 16/9;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #94a3b8;
            text-align: center;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Inserisci il tmdb_id di un film (es. 603692)">
            <button onclick="fetchStream()">Carica Film</button>
        </div>
        
        <video id="video-player" controls preload="auto"></video>
        <div class="status" id="status-text">In attesa di un ID TMDB...</div>
    </div>

    <script>
        const videoElement = document.getElementById('video-player');
        const statusText = document.getElementById('status-text');
        let hlsInstance = null;

        class CORSProxyLoader extends Hls.DefaultConfig.loader {
            constructor(config) {
                super(config);
                const originalLoad = this.load.bind(this);
                this.load = function (context, config, callbacks) {
                    if (context.url.startsWith('http')) {
                        context.url = 'https://corsproxy.io/?' + encodeURIComponent(context.url);
                    }
                    originalLoad(context, config, callbacks);
                };
            }
        }

        async function fetchStream() {
            const tmdbId = document.getElementById('searchInput').value;
            if (!tmdbId) return;

            statusText.innerText = "Interrogazione della Serverless Function Python...";
            
            try {
                // Modifica Cruciale: Percorso Relativo per l'API Vercel
                const response = await fetch(`/api/get_stream?tmdb_id=${tmdbId}`);
                const data = await response.json();

                if (data.error) {
                    statusText.innerText = `Errore API: ${data.error}`;
                    return;
                }

                if (data.m3u8_url) {
                    playVideo(data.m3u8_url);
                }

            } catch (error) {
                statusText.innerText = "Errore di rete. Impossibile contattare l'API Vercel.";
            }
        }

        function playVideo(m3u8Url) {
            statusText.innerText = `Avvio stream tramite bypass CORS...`;

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    pLoader: CORSProxyLoader,
                    fLoader: CORSProxyLoader
                });
                
                hlsInstance.loadSource(m3u8Url);
                hlsInstance.attachMedia(videoElement);

                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    statusText.innerText = `In riproduzione (Vercel Serverless -> Proxy -> HTML)`;
                    videoElement.play().catch(() => console.warn("Premere play per avviare"));
                });

                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusText.innerText = `Errore fatale del video. Proxy intesato o token scaduto.`;
                        hlsInstance.destroy();
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = m3u8Url;
                videoElement.play();
            }
        }
    </script>
</body>
</html>
