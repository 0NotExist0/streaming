<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Video Player Ottimizzato</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            aspect-ratio: 16/9;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #475569;
        }

        button.active-server {
            background-color: var(--primary);
            border-color: #60a5fa;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #94a3b8;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            background-color: #0f172a;
        }

        .error-msg {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="video-player" controls preload="auto"></video>
        
        <div class="controls" id="server-controls">
            </div>

        <div class="status" id="status-text">Inizializzazione player...</div>
    </div>

    <script>
        window.video = { id: '237396', filename: '' };
        window.streams = [
            {"name":"Server1","active":true,"url":"https:\/\/vixcloud.co\/playlist\/237396?ub=1"},
            {"name":"Server2","active":false,"url":"https:\/\/vixcloud.co\/playlist\/237396?ab=1"}
        ];
        window.masterPlaylist = {
            params: {
                'token': '83059bd4e7ce8d27a06d255ea2aceb26',
                'expires': '1782324217',
                'asn': '',
            },
            url: 'https://vixcloud.co/playlist/237396',
        }
        window.canPlayFHD = true;
        window.thumbnailsUrl = 'https://sc-u6-01.vix-content.net/hls/15/6/09/609f2357-f786-4145-a94c-9671be47e3af/thumbnails/thumbnails.vtt';
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const videoElement = document.getElementById('video-player');
            const controlsContainer = document.getElementById('server-controls');
            const statusText = document.getElementById('status-text');
            
            let hlsInstance = null; 

            // Metodo completo per pulire l'istanza precedente senza generare eccezioni DOM
            function destroyPlayerSafely() {
                if (hlsInstance) {
                    // Ferma il download prima di distruggere per evitare il DOMException abort
                    hlsInstance.stopLoad();
                    hlsInstance.detachMedia();
                    hlsInstance.destroy();
                    hlsInstance = null;
                }
                
                // Pulisci l'elemento video
                videoElement.pause();
                videoElement.removeAttribute('src');
                videoElement.load();
            }

            // Metodo completo per caricare e riprodurre lo stream
            function loadStream(streamUrl, serverName) {
                const token = window.masterPlaylist.params.token;
                const expires = window.masterPlaylist.params.expires;
                const finalUrl = `${streamUrl}&token=${token}&expires=${expires}`;

                statusText.innerHTML = `Tentativo di connessione a <strong>${serverName}</strong>...`;
                statusText.className = 'status';

                // Distruggi la vecchia istanza in modo sicuro
                destroyPlayerSafely();

                if (Hls.isSupported()) {
                    hlsInstance = new Hls({
                        // Configurazione ottimizzata per evitare timeout su server lenti
                        maxLoadingDelay: 4,
                        minAutoBitrate: 0,
                    });
                    
                    hlsInstance.loadSource(finalUrl);
                    hlsInstance.attachMedia(videoElement);

                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        statusText.innerHTML = `In riproduzione da <strong>${serverName}</strong>.`;
                        
                        // Gestione corretta della Promise del play() per evitare eccezioni
                        const playPromise = videoElement.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.warn("L'autoplay è stato bloccato dal browser. L'utente deve cliccare su Play.", error);
                            });
                        }
                    });

                    // Gestione degli errori strutturata
                    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    // Spesso indica un blocco CORS o token scaduto
                                    statusText.innerHTML = `<span class="error-msg">Errore di rete su ${serverName}. Possibile blocco CORS o token invalido.</span>`;
                                    hlsInstance.destroy();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    statusText.innerHTML = `Errore media su ${serverName}. Tento il ripristino...`;
                                    hlsInstance.recoverMediaError();
                                    break;
                                default:
                                    statusText.innerHTML = `<span class="error-msg">Errore irrecuperabile su ${serverName}.</span>`;
                                    hlsInstance.destroy();
                                    break;
                            }
                        }
                    });

                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    // Fallback per Safari
                    videoElement.src = finalUrl;
                    videoElement.addEventListener('loadedmetadata', () => {
                        statusText.innerHTML = `In riproduzione da <strong>${serverName}</strong> (Nativo).`;
                        videoElement.play().catch(e => console.warn(e));
                    });
                    
                    videoElement.addEventListener('error', () => {
                         statusText.innerHTML = `<span class="error-msg">Errore di caricamento nativo su ${serverName}. Possibile blocco CORS.</span>`;
                    });
                } else {
                    statusText.innerHTML = "<span class='error-msg'>Il tuo browser non supporta lo standard HLS.</span>";
                }
            }

            // Metodo completo per inizializzare l'interfaccia utente
            function setupUI() {
                window.streams.forEach(stream => {
                    const btn = document.createElement('button');
                    btn.innerText = stream.name;
                    
                    if (stream.active) {
                        btn.classList.add('active-server');
                        loadStream(stream.url, stream.name);
                    }

                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active-server'));
                        btn.classList.add('active-server');
                        loadStream(stream.url, stream.name);
                    });

                    controlsContainer.appendChild(btn);
                });
            }

            // Avvio dello script
            setupUI();
        });
    </script>
</body>
</html>
